packages:
  - plugins/*

overrides:
  '@cradle/cli': 'file:../cradle-app/packages/cli'
  '@cradle/plugin-sdk': 'file:../cradle-app/packages/plugin-sdk'

onlyBuiltDependencies:
  - esbuild

catalog:
  '@cradle/plugin-sdk': '^0.2.0'
  '@types/node': '^22.19.1'
  '@types/react': '^19.2.1'
  '@types/react-dom': '^19.2.1'
  react: '^19.2.1'
  react-dom: '^19.2.1'
  tsdown: '^0.22.9'
  typescript: '^5.9.3'
  vitest: '^4.1.4'
  zod: '^4.4.3'

allowBuilds:
  better-sqlite3: true
  esbuild: true
